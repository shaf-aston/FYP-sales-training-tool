# Sales tactics and elicitation examples
# Elicitation tactics for low-intent/guarded users (consultative strategy)
# Ordered by intervention level: lightest to most assertive

tactics:
  # Elicitation types for guarded/low-intent users
  elicitation:
    presumptive:
      - "You've probably already tried the obvious stuff - like doing it in-house?"
      - "I'm guessing you've looked at free alternatives first?"
      - "Sounds like you've been handling this yourself for a while?"

    understatement:
      - "So it's basically fine the way it is?"
      - "Doesn't sound like it's urgent, then?"
      - "Not really a big issue day-to-day?"

    reflective:
      - "You're stuck between sticking with what you have and trying something new."
      - "There's something holding you back from moving forward."
      - "It's not quite working, but it's not broken enough to act."

    shared_observation:
      - "Most people in your situation feel torn between staying the course and exploring options."
      - "What you're describing is really common - lots of folks hit this same wall."
      - "That's the exact tension most people face at this stage."

    curiosity:
      - "I'm genuinely curious - what's made you stick with the current approach so far?"
      - "What's the real reason you haven't made a change yet?"
      - "Help me understand what's working about the status quo for you?"

    combined:
      - "Most people in your situation feel trapped between their current setup and exploring new options. What's kept you from making a move so far?"
      - "You've probably tried handling this yourself already. What's made that approach work for you up until now?"
      - "I'm guessing this isn't urgent, but there's something nudging you to look at alternatives. What is it?"

  # Stage-level tactics (legacy, kept for compatibility)
  discovery:
    - Listen and ask open questions
    - Identify customer pain points
    - Build rapport

  logical:
    - Present feature benefits
    - Address specific concerns
    - Provide evidence

  emotional:
    - Connect on values
    - Share success stories
    - Build urgency

  pitch:
    - Clear value proposition
    - Call to action
    - Handle final objections

  close:
    - Confirm decision
    - Next steps
    - Thank customer
