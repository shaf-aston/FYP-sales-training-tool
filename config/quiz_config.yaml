# Quiz Assessment Configuration
# Defines the stages and questions used to score training conversations

# Stage descriptions and clear evaluation criteria for quiz scoring
stages:
  consultative:
    intent:
      goal: "Complete the INTENT stage by confirming the user's goal and context"
      advance_when: "Advance when INTENT is clear enough to switch or progress"
      next_stage: "logical"
      key_concepts:
        - "Open-ended discovery questions"
        - "Match user's energy"
        - "No pitching yet"
        - "Listen for tangible goals"

    logical:
      goal: "Complete the LOGICAL stage by surfacing a clear problem and doubt"
      advance_when: "Advance when LOGICAL conditions are met"
      next_stage: "emotional"
      key_concepts:
        - "Two-phase probe (cause then like/dislike)"
        - "Never state problem for them"
        - "Create doubt in current approach"
        - "Max 1 question per turn"

    emotional:
      goal: "Complete the EMOTIONAL stage by surfacing stakes and consequences"
      advance_when: "Advance when EMOTIONAL stakes are clear"
      next_stage: "pitch"
      key_concepts:
        - "Identity frame (why change now)"
        - "Future pacing (what would be different)"
        - "Consequence of inaction"
        - "Connect to personal stakes"

    pitch:
      goal: "Complete the PITCH stage by presenting the offer at the right time"
      advance_when: "Advance when PITCH leads to commitment or objection"
      next_stage: "objection"
      key_concepts:
        - "Get micro-commitment first"
        - "Three pillars tied to stated goals"
        - "Assumptive close"
        - "No trailing questions"

    objection:
      goal: "Complete the OBJECTION stage by handling the current objection"
      advance_when: "Advance when OBJECTION resolves to commitment or walk-away"
      next_stage: null
      key_concepts:
        - "Classify (money/partner/fear/think/smokescreen)"
        - "Recall their stated goals"
        - "Reframe using type-specific strategy"
        - "Never argue or pressure"

  transactional:
    intent:
      goal: "Complete the INTENT stage by confirming budget and use-case quickly"
      advance_when: "Advance when transactional INTENT is clear"
      next_stage: "pitch"
      key_concepts:
        - "Fast discovery"
        - "Budget first"
        - "Use-case second"
        - "No emotional probing"

    pitch:
      goal: "Complete the PITCH stage by presenting matching options"
      advance_when: "Advance when PITCH moves into NEGOTIATION, commitment, or objection"
      next_stage: "negotiation"
      key_concepts:
        - "Match to stated needs"
        - "Sensory language"
        - "Price and availability included"
        - "Lead into terms discussion"

    negotiation:
      goal: "Complete the NEGOTIATION stage by resolving terms"
      advance_when: "Advance when NEGOTIATION terms are clarified"
      next_stage: "objection"
      key_concepts:
        - "Keep terms discussion concise"
        - "Use exact price and payment details"
        - "No emotional probing"
        - "One question only"

    objection:
      goal: "Complete the OBJECTION stage by answering the concern directly"
      advance_when: "Advance when OBJECTION resolves to commitment or walk-away"
      next_stage: null
      key_concepts:
        - "Acknowledge concern"
        - "Redirect to benefits"
        - "Simple, direct answers"
        - "No over-elaboration"

# Quiz question templates by type
questions:
  stage:
    - "What FSM stage are we in right now?"
    - "Based on the conversation so far, which FSM stage and strategy are active?"
    - "Can you identify the current FSM stage and strategy?"
    - "Where are we in the FSM (stage and strategy)?"

  next_move:
    - "What would you say next to this customer?"
    - "How would you respond to their last message?"
    - "As the salesperson, what's your next response?"
    - "Given the conversation so far, what would be an effective next message?"

  direction:
    - "Where are you taking this conversation and why?"
    - "What's your strategy for moving forward from here?"
    - "Explain your approach for the next few turns."
    - "What are you trying to achieve and how will you get there?"
