# Analysis thresholds
thresholds:
  min_substantive_word_count: 8
  short_message_limit: 4
  question_fatigue_threshold: 2
  validation_loop_threshold: 2
  recent_history_window: 10
  recent_text_messages: 3

# Question patterns
question_patterns:
  starters:
    - "what"
    - "when"
    - "where"
    - "who"
    - "how"
    - "why"
    - "whats"
    - "which"
    - "can you"
    - "could you"
    - "would you"
    - "will you"
    - "do you"
    - "does"
    - "is"
    - "are"
  rhetorical_markers:
    - "right?"
    - "don't you think"
    - "wouldn't you say"

# Elicitation guidance (Behavior Ops tradecraft - informational only for LLM prompts)
# Purpose: LLM understands when to use STATEMENTS instead of QUESTIONS
# Note: Actual implementation in content.py TACTICS dict and analyze_state() logic
elicitation_context:
  description: "Use statements to extract information when direct questions fail or trigger defensiveness"
  
  # When system switches from questions to elicitation statements
  # These align with analyze_state() checks in analysis.py
  mode_triggers:
    - "low_intent detected (just browsing signals)"
    - "guarded response (short + evasive after question)"
    - "question_fatigue (2+ consecutive bot questions)"
    - "validation_loop (excessive acknowledgments)"
    - "no_preferences_extracted (user not volunteering info)"
  
  # Elicitation statement types (implemented in content.py TACTICS["elicitation"])
  statement_types:
    presumptive: "Assume incorrect state to trigger correction"
    understatement: "Downplay to reduce pressure"
    reflective: "Mirror without asking"
    shared_observation: "Reference common patterns"
    curiosity_statement: "Express interest without demanding"

# Advancement configuration (FSM stage transitions)
advancement:
  # Intent discovery stage
  intent:
    low_intent_max_turns: 6
    high_intent_max_turns: 4
  
  # Logical certainty stage (consultative)
  logical:
    max_turns: 10  # Safety valve (was 5, updated to enforce framework)
    min_matches: 1
    # Doubt signal keywords
    # NOTE: Removed single-word generics ("bad", "worse", "slow", "wrong", "miss",
    # "mistake", "error", "confusion", "unsure") — they fire on unrelated contexts.
    # Examples: "wrong person", "slow weather", "mistake yesterday" =/= problem doubt.
    doubt_keywords:
      - "not working"
      - "struggling"
      - "problem"
      - "difficult"
      - "frustrated"
      - "issue"
      - "challenge"
      - "stuck"
      - "failing"
      - "fail"
      - "costing"
      - "losing"
      - "waste"
      - "inefficient"
      - "broken"
      - "unreliable"
      - "inconsistent"
  
  # Emotional certainty stage (consultative)
  emotional:
    max_turns: 10  # Safety valve (was 6, updated to enforce framework)
    min_matches: 1
    # Emotional stakes keywords
    # NOTE: Removed single-word generics ("feel", "need", "change", "care", "tired",
    # "matter") — they fire on unrelated contexts (physical fatigue, preferences,
    # historical facts). Kept emotional investment language with clear stakes focus
    # ("worried", "family", "career", "security", "desperate", etc.)
    stakes_keywords:
      - "worried"
      - "excited"
      - "scared"
      - "hope"
      - "fear"
      - "impact"
      - "life"
      - "future"
      - "dream"
      - "stress"
      - "pressure"
      - "important"
      - "family"
      - "loved ones"
      - "career"
      - "security"
      - "peace of mind"
      - "anxiety"
      - "relief"
      - "desperate"
      - "urgent"
      - "exhausted"
      - "fed up"
