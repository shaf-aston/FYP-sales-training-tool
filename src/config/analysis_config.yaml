# Objection handling configuration
objection_handling:
  # Classification priority order (check in this order)
  classification_order:
    - "smokescreen"
    - "partner"
    - "money"
    - "fear"
    - "logistical"
    - "think"

  # Reframe strategies per type
  reframe_strategies:
    fear:
      - "change_of_process"
      - "island_analogy"
      - "identity_reframe"
    logistical:
      - "solve_mechanics"
      - "simplify_process"
    money:
      - "isolate_funds"
      - "self_solve"
      - "plant_credit"
      - "funding_options"
    partner:
      - "same_side"
      - "open_wallet_test"
      - "schedule_followup"
    think:
      - "drill_to_root"
      - "handle_root_type"
    smokescreen:
      - "legitimacy_test"

# Goal indicator keywords for intent locking
# Removed near-universal verbs ("want to", "need to", "trying", "fix", "solve",
# "improve", "upgrade", "replace", "better", "ready to", "time to") — fire on
# unrelated utterances, causing premature intent lock.
# Removed duplicates with high_intent (signals.yaml): "struggling", "trying to",
# "problem", "shopping for" — kept in high_intent only (per-turn detection).
goal_indicators:
  # Core intent indicators (domain-agnostic)
  - "lose weight"
  - "put on muscle"
  - "been fat"
  - "looking to"
  - "issue"
  - "challenge"
  - "goal"
  - "tired of"
  - "sick of"
  - "fed up"
  - "done with"
  - "in the market for"
  - "comparing options"
  - "decided to"
  - "planning to buy"
  # Real estate specific
  - "buying a home"
  - "selling my house"
  - "moving to"
  - "relocating"
  - "downsizing"
  - "upsizing"
  - "first home"
  # Fitness specific
  - "get in shape"
  - "build strength"
  - "run a marathon"
  - "competition prep"
  - "health transformation"
  # Financial specific
  - "retire early"
  - "grow wealth"
  - "financial freedom"
  - "passive income"
  - "protect assets"
  # Insurance specific
  - "protect my family"
  - "peace of mind"
  - "coverage gap"
  - "underinsured"
  # Education specific
  - "change careers"
  - "upskill"
  - "get certified"
  - "land a job"
  - "promotion"
  # B2B specific
  - "scale operations"
  - "reduce costs"
