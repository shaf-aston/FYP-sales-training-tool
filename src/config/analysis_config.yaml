  - "honeymoon"

# Preference extraction keywords (prioritized by frequency & likelihood)
# Purpose: Keyword matching → Category extraction → Injected into LLM prompt as context
# Usage: extract_preferences() scans history, returns "budget, safety, efficiency" → LLM personalizes response
preference_keywords:
  # FINANCIAL CONCERN - Most common objection & preference anchor
  budget:
    - "affordable"
    - "out of pocket"
    - "payment plan"
    - "what's the price"
    - "monthly cost"
    - "can't spend"
    - "value"
    - "worth it"
  
  # RELIABILITY - Risk mitigation, trust signal
  reliability:
    - "reliable"
    - "reliability"
    - "dependable"
    - "break down"
    - "won't fail"
    - "trustworthy"
    - "problem-free"
    - "last long"
    - "not fail"
  
  # SAFETY - Emotional priority, often family-driven
  safety:
    - "safe"
    - "safety"
    - "crash test"
    - "protection"
    - "secure"
    - "airbags"
    - "accident"
    - "peace of mind"
    - "protect"
  
  # FUEL EFFICIENCY - Ongoing cost concern
  efficiency:
    - "fuel efficient"
    - "mpg"
    - "gas"
    - "consume"
    - "fuel cost"
    - "electric"
    - "hybrid"
    - "save on gas"
  
  # COMFORT & LUXURY - Lifestyle/lifestyle upgrade
  # NOTE: "luxury" also appears in luxury_cars product context (product_config.yaml line ~21).
  # In automotive/transactional sessions, "luxury" triggers preference extraction (comfort) rather than
  # product matching. This is intentional (transactional = direct to pitch) but worth noting.
  comfort:
    - "comfortable"
    - "comfort"
    - "luxury"
    - "plush"
    - "cozy"
    - "nice"
    - "smooth ride"
    - "relaxing"
  
  # PERFORMANCE - Enthusiasm/excitement driver
  performance:
    - "fast"
    - "speed"
    - "horsepower"
    - "powerful"
    - "acceleration"
    - "sporty"
    - "quick"
    - "exciting"
  
  # TECHNOLOGY - Modern buyer priority
  technology:
    - "tech"
    - "smart"
    - "touchscreen"
    - "apple carplay"
    - "android auto"
    - "navigation"
    - "bluetooth"
    - "infotainment"
    - "connected"
    - "updates"
  
  # FAMILY NEEDS - Life stage indicator
