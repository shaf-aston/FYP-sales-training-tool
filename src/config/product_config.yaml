# Sales strategy config per product
# strategy: which FSM flow to use (consultative / transactional / intent)
# aliases: alternative names that map to the same product
# knowledge: injected into the LLM system prompt at runtime

products:

  # ─── Discovery (unknown product) ────────────────────────────────────────────

  default:
    strategy: "intent"
    context: "various products and services"
    knowledge: |
      You represent a sales assistant who can help with multiple product categories.
      When asked what you sell: briefly explain you can assist with various products and ask what they're interested in.
      Focus on understanding their needs quickly and moving to relevant options.

  # ─── Consultative — high-ticket, relationship-driven ────────────────────────

  luxury_cars:
    strategy: "consultative"
    context: "luxury vehicles"
    aliases: ["luxury_car", "luxury", "premium_cars"]
    knowledge: |
      Available models:
      - BMW X3 (2026): $50,900-$65,900. Turbocharged 4-cyl 255hp (30 xDrive) or 6-cyl M50 xDrive. xDrive AWD standard, curved 12.3" display, iDrive 8, Harman Kardon audio, adaptive suspension. MPG: 28 city / 35 highway. Best for: sporty handling, tech features, driving dynamics.
      - Mercedes-Benz C-Class (2026): $49,650-$64,150. C300 (255hp turbo 4-cyl) or AMG C43 (416hp). MBUX infotainment, 64-colour ambient lighting, Burmester 3D audio, rear-axle steering option. MPG: 26 city / 35 highway. Best for: interior luxury, prestige, ride comfort.
      - Audi A6 (2026): $57,000-$70,000+. 3.0L turbocharged V6 362hp, quattro AWD, virtual cockpit plus, MMI touch response, Bang & Olufsen audio, matrix LED headlights. Best for: understated prestige, AWD confidence, technology.
      Key differentiators: BMW=sporty/driver-focused, Mercedes=luxury comfort/prestige, Audi=technology and AWD capability.
      Audi offers free scheduled maintenance for first 3 years/30,000 miles (2026 models). BMW ConnectedDrive included. Mercedes MBUX gets OTA updates.

  fitness:
    strategy: "consultative"
    context: "personal fitness coaching and nutrition"
    aliases: ["gym", "training", "coaching", "supplements", "personal_training", "workout"]
    knowledge: |
      Available coaching plans:
      - Foundation Plan: $99/month. 2 x 1:1 coaching sessions/week, basic meal plan template, training app access, monthly progress call. Best for: beginners, building habits, accountability.
      - Transformation Plan: $199/month. 4 x 1:1 sessions/week, fully customised nutrition and macro tracking, weekly video check-ins, supplement guidance, body composition tracking. Best for: committed individuals wanting structured, measurable results.
      - Elite Coaching: $399/month. Daily coach access, personalised nutrition protocol, supplement stack, bi-weekly InBody scans, priority messaging, competition prep option. Best for: serious athletes, rapid transformation, competition prep.
      Key differentiators: Foundation=habits/accountability, Transformation=structured results, Elite=all-in performance coaching.
      Additional context: Average client loses 12-15 lbs in first 3 months on Transformation plan. 95% client retention. All coaches NASM/ACE certified with 5+ years experience. 30-day money-back guarantee if no visible results.

  insurance:
    strategy: "consultative"
    context: "life and health insurance plans"
    aliases: ["life_insurance", "health_insurance", "coverage", "policy", "policies"]
    knowledge: |
      Available plans:
      - Essential Life: $35/month. $250,000 term life cover (20-year term), no medical exam required, digital application, coverage begins within 48 hours. Best for: young adults, first-time buyers, basic financial protection.
      - Family Shield: $145/month. $500,000 life cover, $300 deductible, full hospitalisation, GP and specialist visits, dental and vision add-on available, covers family of 4. Best for: young families, comprehensive everyday protection.
      - Premium Protection: $245/month. $1,000,000 life cover, critical illness rider, income protection, mental health coverage, worldwide emergency cover, dedicated personal advisor. Best for: high earners, executives, maximum peace of mind.
      Key differentiators: Essential=affordable entry-level, Family Shield=comprehensive family cover, Premium=full protection with extras.
      Additional context: Claims processed within 48 hours. 15% multi-policy discount. A+ rated by AM Best. Average life insurance cost in 2026 is $26/month nationally — our plans include bundled benefits beyond basic life cover.

  jewelry:
    strategy: "consultative"
    context: "fine jewelry and engagement rings"
    aliases: ["rings", "engagement", "diamonds", "necklace", "bracelet"]
    knowledge: |
      Available pieces:
      - Classic Solitaire Ring: $3,800-$5,500. 0.75-1.0ct round brilliant natural diamond, VS2 clarity, G colour, 14k white gold band, GIA certified. Best for: timeless elegance, traditional engagement.
      - Halo Pavé Ring: $6,000-$9,000. 1.0-1.5ct centre diamond, VS1 clarity, F colour, 18k white gold, 0.35ct pavé accent halo, GIA certified. Best for: maximum sparkle, modern romance, statement piece.
      - Lab-Grown Solitaire: $2,200-$3,500. 1.0-1.5ct lab-created diamond, VVS clarity, E-F colour, 14k white gold. Chemically identical to natural diamonds at 40-60% less cost. Best for: value-conscious buyers, eco-conscious couples.
      - Tennis Bracelet: $4,500-$7,000. 3.0-5.0ct total weight, round brilliant diamonds, VS2-SI1 clarity, G-H colour, 14k white gold, box clasp with safety catch. Best for: anniversary gifts, everyday luxury.
      Key differentiators: Solitaire=timeless/understated, Halo=brilliance/modern, Lab-Grown=value without compromise, Tennis Bracelet=versatile gifting.
      Additional context: Average US engagement ring spend in 2026 is $6,500-$8,580. All natural diamonds ethically sourced and conflict-free. Lifetime setting warranty. Free resizing within first year. 30-day return policy.

  financial_services:
    strategy: "consultative"
    context: "personal financial advisory and wealth management"
    aliases: ["investments", "investing", "wealth", "financial", "advisory", "portfolio"]
    knowledge: |
      Available service tiers:
      - Wealth Starter: $50,000 minimum investment. 0.75% annual management fee, diversified ETF portfolio, quarterly rebalancing, annual review meeting, online dashboard. Best for: young professionals, first-time investors, long-term wealth building.
      - Premium Advisory: $250,000 minimum investment. 0.50% annual fee, personalised asset allocation, monthly rebalancing, dedicated advisor, tax-loss harvesting, quarterly strategy calls. Best for: established earners, active wealth optimisation.
      - Private Wealth: $1,000,000+ minimum investment. 0.35% annual fee, bespoke portfolio construction, alternative investments (private equity, hedge funds), estate planning integration, family office services, direct line to senior advisor. Best for: high-net-worth individuals, complex financial situations.
      Key differentiators: Starter=accessible/automated, Premium=personalised/hands-on, Private Wealth=bespoke/comprehensive.
      Additional context: SEC-registered investment advisor. Average 8.2% annual net returns over past decade. Fiduciary duty — legally obligated to act in your best interest. SIPC insured up to $500,000. Fee-based model (no commissions).

  # ─── Transactional — direct, price-driven ───────────────────────────────────

  budget_fragrances:
    strategy: "transactional"
    context: "$30 fragrances"
    aliases: ["fragrance", "fragrances", "perfume", "cologne"]
    knowledge: |
      Available fragrances:
      - Fresh Sport: $25. Citrus top notes, aquatic heart, cedar base. Lasts 4-6 hours. Best for: daytime, office, gym.
      - Dark Oud: $30. Oud, amber, vanilla, musk base. Lasts 8-10 hours. Best for: evening, dates, winter.
      - Classic Woody: $28. Bergamot, lavender, sandalwood, vetiver. Lasts 6-8 hours. Best for: everyday, versatile.
      Key differentiators: Fresh Sport=light/daytime, Dark Oud=bold/evening, Classic Woody=versatile/all-occasion.

  watches:
    strategy: "transactional"
    context: "watches"
    aliases: ["watch", "timepiece", "timepieces"]
    knowledge: |
      Available watches:
      - Chrono Sport: $180. Stainless steel, 42mm, chronograph, 100m water resistance, leather strap. Style: sporty/casual.
      - Classic Dress: $220. Rose gold case, 38mm, sapphire crystal, slim profile, mesh bracelet. Style: formal/elegant.
      - Diver Pro: $250. Titanium, 44mm, automatic movement, 300m water resistance, rotating bezel, rubber strap. Style: adventure/sport.
      Key differentiators: Chrono=everyday sport, Classic=formal occasions, Diver=serious water/adventure use.

  automotive:
    strategy: "transactional"
    context: "automotive purchase"
    aliases: ["car", "cars", "vehicle", "vehicles", "auto", "automobile"]
    knowledge: |
      Available vehicles:
      - Toyota Corolla: $22,000-$28,000. 2.0L 4-cylinder, 169hp, 8.0" touchscreen, Toyota Safety Sense, 40 MPG highway. Best for: reliability, fuel economy, commuting.
      - Honda Civic: $24,000-$30,000. 1.5L turbo, 180hp, 9.0" touchscreen, Honda Sensing, 37 MPG highway. Best for: driving fun, tech features, resale value.
      - Hyundai Elantra: $21,000-$27,000. 2.0L 4-cylinder, 147hp, 10.25" touchscreen, SmartSense safety, 37 MPG highway. Best for: value, warranty (10yr/100k), features per dollar.
      Key differentiators: Corolla=reliability king, Civic=driver's choice, Elantra=best value.

  premium_electronics:
    strategy: "transactional"
    context: "premium electronics"
    aliases: ["electronics", "laptop", "laptops", "tech", "computer", "computers", "phone", "phones"]
    knowledge: |
      Available products:
      - MacBook Pro 14": $1,999-$2,499. Apple M3 Pro chip, 18GB RAM, 512GB-1TB SSD, 14.2" Liquid Retina XDR display, 18hr battery, MagSafe charging. Best for: creative professionals, developers, Apple ecosystem users.
      - Dell XPS 15: $1,499-$2,199. Intel Core i7-13700H, 16-32GB RAM, 512GB-1TB SSD, 15.6" OLED 3.5K display, Thunderbolt 4. Best for: Windows power users, business professionals, versatility.
      - Samsung Galaxy S24 Ultra: $1,299-$1,419. Snapdragon 8 Gen 3, 12GB RAM, 256GB-1TB, 6.8" QHD+ AMOLED, S Pen, 200MP camera, 5000mAh battery. Best for: Android enthusiasts, photography, productivity on the go.
      Key differentiators: MacBook=ecosystem/battery/build quality, XPS=Windows versatility/display, Galaxy=mobile photography/S Pen.

  # ─── Additional Consultative Products ─────────────────────────────────────────

  real_estate:
    strategy: "consultative"
    context: "residential real estate services"
    aliases: ["property", "home", "house", "apartment", "condo", "housing", "realtor"]
    knowledge: |
      Available services:
      - Buyer Representation: 2.5-3% commission (paid by seller typically). Full MLS access, offer negotiation, inspection coordination, closing support. Best for: first-time buyers, relocators, anyone wanting guidance through purchase.
      - Seller Listing: 5-6% total commission (split with buyer's agent). Professional photography, MLS listing, open houses, staging consultation, offer management. Average days on market: 28 in our area. Best for: maximizing sale price, handling complexity.
      - Investment Property Advisory: Flat fee $2,500 or 1% of purchase. Cap rate analysis, cash flow projections, tenant acquisition support, property management referrals. Best for: rental investors, portfolio builders.
      Market context: 2026 median home price nationally $420,000. Interest rates averaging 6.2%. Inventory remains tight in most metros (2.1 months supply vs. 6 months balanced). First-time buyers face 20% down payment challenge — average $84,000.
      Key differentiators: We specialize in [area] market with 15+ years experience. 98% client satisfaction rating. Average 3.2% above asking price for seller clients.

  b2b_saas:
    strategy: "consultative"
    context: "business productivity software"
    aliases: ["software", "saas", "crm", "erp", "business_software", "enterprise"]
    knowledge: |
      Available solutions:
      - Team Essentials: $15/user/month (billed annually). Project management, team chat, file sharing, 10GB storage/user, email integration. Best for: small teams (5-20), startups, agencies.
      - Professional Suite: $35/user/month. Full CRM, pipeline tracking, reporting dashboards, automation workflows, 100GB storage/user, API access, SSO. Best for: growing companies (20-100), sales teams, operations teams.
      - Enterprise Platform: Custom pricing (~$50-80/user/month). Dedicated account manager, custom integrations, unlimited storage, advanced security (SOC 2, HIPAA), on-premise option, 24/7 priority support. Best for: enterprises (100+), regulated industries, complex workflows.
      Competitive context: Salesforce averages $75/user/month. HubSpot CRM free tier limited to 2 users. We offer 30-day free trial, no credit card required. Implementation typically 2-4 weeks.
      ROI data: Average customer sees 23% productivity improvement within 6 months. 94% year-2 retention rate.

  education:
    strategy: "consultative"
    context: "professional education and certification programs"
    aliases: ["course", "courses", "certification", "training_program", "bootcamp", "learning"]
    knowledge: |
      Available programs:
      - Professional Certificate: $1,200-$2,500. 8-12 week program, self-paced online, industry-recognized certification, career services. Subjects: Data Analytics, Digital Marketing, Project Management, UX Design. Best for: career changers, skill upskilling, resume enhancement.
      - Intensive Bootcamp: $8,000-$15,000. 12-16 week full-time immersive, live instruction, portfolio projects, job placement support (85% placement rate within 6 months). Subjects: Software Engineering, Data Science, Cybersecurity. Best for: career transition, comprehensive skill acquisition.
      - Executive Education: $5,000-$20,000. 6-month part-time, cohort-based, networking events, capstone project, alumni network access. Subjects: Leadership, Strategy, Digital Transformation. Best for: mid-career professionals, leadership development.
      Financing: Income share agreements available (pay 10% of salary for 24 months after placement, capped at 1.5x tuition). Monthly payment plans at 0% APR for qualified applicants.
      Outcomes: 92% completion rate. Average salary increase of $15,000-$25,000 post-certification.

  home_services:
    strategy: "consultative"
    context: "home improvement and renovation services"
    aliases: ["renovation", "remodel", "contractor", "home_improvement", "kitchen", "bathroom", "roofing"]
    knowledge: |
      Available services:
      - Kitchen Remodel: $25,000-$75,000 (average $45,000). Design consultation, cabinet installation, countertops, appliances, plumbing/electrical, project management. Timeline: 6-12 weeks. Best for: homeowners wanting modernization, increased home value.
      - Bathroom Renovation: $12,000-$35,000 (average $22,000). Layout changes, tile work, fixtures, vanity/storage, lighting. Timeline: 3-6 weeks. Best for: dated bathrooms, accessibility improvements.
      - Whole Home Renovation: $100,000-$300,000+. Full-service design-build, structural changes, permits, inspection coordination. Timeline: 4-8 months. Best for: older homes, floor plan changes, major upgrades.
      - Roofing: $8,000-$18,000 (average $12,000). Material options: asphalt shingles (25-year warranty), architectural shingles (30-year), metal (50-year). Includes tear-off, underlayment, flashing, cleanup.
      Financing: 12-month 0% APR available for projects over $10,000. Home equity line coordination assistance.
      Quality: Licensed, bonded, insured. 5-year workmanship warranty. BBB A+ rating. 4.8/5 stars (380+ reviews).

  healthcare_services:
    strategy: "consultative"
    context: "concierge medicine and wellness services"
    aliases: ["doctor", "medical", "health", "wellness", "concierge_medicine", "healthcare"]
    knowledge: |
      Available memberships:
      - Essential Wellness: $150/month. Unlimited primary care visits, same-day/next-day appointments, 24/7 telehealth, annual comprehensive wellness exam, basic lab work included. Best for: individuals wanting accessible primary care.
      - Premium Health: $350/month. Everything in Essential plus: executive physical, advanced diagnostics, specialist coordination, health coaching (monthly calls), genetic screening. Best for: proactive health management, busy professionals.
      - Family Plan: $500/month (up to 4 members). Full coverage for household, pediatric care, immunizations, well-child visits, family health planning. Best for: families wanting comprehensive accessible care.
      Comparison: Traditional healthcare averages 18-day wait for appointments. Our average: same-day for urgent, 48 hours for routine. Insurance coordination available — many visits covered by HSA/FSA.
      Outcomes: Members average 40% fewer ER visits, 25% better chronic condition management.

  # ─── Additional Transactional Products ───────────────────────────────────────

  travel:
    strategy: "transactional"
    context: "travel packages and accommodations"
    aliases: ["vacation", "trip", "hotel", "flight", "travel_package", "holiday"]
    knowledge: |
      Available packages:
      - Weekend Getaway: $299-$599/person. 2-night stay, boutique hotel (4-star), airport transfers, breakfast included. Destinations: Miami, Vegas, NYC, Austin. Best for: quick escapes, couples.
      - All-Inclusive Resort: $1,200-$2,500/person (5 nights). Beachfront resort, unlimited dining/drinks, activities, airport transfers. Destinations: Cancun, Punta Cana, Jamaica. Best for: relaxation, families, hassle-free.
      - Adventure Package: $1,800-$3,500/person (7 nights). Guided activities, boutique lodging, expert local guides, equipment included. Destinations: Costa Rica, Iceland, Peru. Best for: active travelers, bucket-list experiences.
      Booking advantages: Price match guarantee (110% refund difference). Flexible cancellation up to 48 hours before. Loyalty points: 1 point/$1 spent, 500 points = $50 credit.
      Timing: Book 60+ days out for best rates. Last-minute deals: 15-30% off unsold inventory.

  fashion:
    strategy: "transactional"
    context: "premium fashion and apparel"
    aliases: ["clothing", "clothes", "apparel", "suit", "dress", "shoes", "accessories"]
    knowledge: |
      Available categories:
      - Business Professional: $150-$800. Tailored suits ($350-$800), dress shirts ($65-$120), leather shoes ($180-$350). Fit guarantee: free alterations within 30 days.
      - Smart Casual: $50-$250. Chinos ($75-$120), polo shirts ($50-$85), casual blazers ($175-$275), loafers ($150-$220). Mix-and-match guidance included.
      - Accessories: $35-$350. Leather belts ($65-$120), ties/pocket squares ($45-$85), watches ($150-$450), briefcases/bags ($200-$400). Gift wrapping available.
      Quality: Premium materials (Italian wool, Egyptian cotton). Ethically sourced. 1-year quality guarantee. Free repairs for stitching/hardware.
      Sizing: Detailed measurement guide online. Free exchange for size (no restocking fee). Personal styling consultation: $50 (credited toward purchase).

  home_appliances:
    strategy: "transactional"
    context: "home appliances and kitchen equipment"
    aliases: ["appliance", "appliances", "refrigerator", "washer", "dryer", "dishwasher", "oven"]
    knowledge: |
      Available categories:
      - Kitchen Major: Refrigerators ($800-$3,500), ranges/ovens ($600-$2,800), dishwashers ($400-$1,200), microwaves ($150-$600). Energy Star certified options available (+$100-300, saves $50-100/year).
      - Laundry: Washers ($500-$1,500), dryers ($450-$1,300), combo units ($1,200-$2,000). Steam features, smart connectivity, large capacity (5.0+ cu ft) options.
      - Small Kitchen: Stand mixers ($200-$450), coffee machines ($100-$800), air fryers ($80-$250), blenders ($50-$450). Brand lineup: KitchenAid, Breville, Ninja, Vitamix.
      Delivery: Free delivery on orders $499+. Installation available ($99-$199). Haul-away of old appliance: $25.
      Protection: Extended warranty options: 2-year ($79), 5-year ($149). Covers mechanical failure, power surge damage. Price match within 30 days of purchase.

  outdoor_equipment:
    strategy: "transactional"
    context: "outdoor and sporting equipment"
    aliases: ["outdoor", "camping", "hiking", "sports", "bike", "bicycle", "fitness_equipment"]
    knowledge: |
      Available categories:
      - Camping: Tents (2-person $80-$200, 4-person $150-$400, 6-person $250-$600), sleeping bags ($50-$300), cookware sets ($40-$150). Brands: REI, Coleman, Big Agnes.
      - Cycling: Road bikes ($500-$3,000), mountain bikes ($600-$4,000), e-bikes ($1,200-$4,500), accessories (helmets $40-$200, locks $30-$120). Free tune-up at 30 days.
      - Hiking: Boots ($80-$280), backpacks (daypack $60-$150, multi-day $150-$400), trekking poles ($40-$180). Sizing guarantee: exchange within 60 days if fit isn't right.
      - Home Fitness: Treadmills ($400-$3,000), exercise bikes ($300-$2,500), rowing machines ($300-$1,500), dumbbells/weights ($1-3/lb).
      Returns: 1-year satisfaction guarantee on all gear. Used return policy: 50% credit if returned within 90 days (cleaned, functional).

  subscription_boxes:
    strategy: "transactional"
    context: "subscription box services"
    aliases: ["subscription", "box", "monthly_box", "subscription_service"]
    knowledge: |
      Available subscriptions:
      - Gourmet Food Box: $45/month. 6-8 artisan products, seasonal themes, recipes included, dietary preferences accommodated (vegetarian, gluten-free, etc.). Ships monthly, skip anytime.
      - Beauty Box: $25-$60/month. 5-6 full or deluxe sample products, personalized to skin type/preferences. $25 tier (samples), $60 tier (full-size). Valued at $100-$200.
      - Book Club Box: $35/month. Curated hardcover + themed extras (bookmark, snacks, exclusive content). Genres: fiction, mystery, romance, sci-fi. First edition options.
      - Coffee Subscription: $18-$35/month. 12oz or 24oz freshly roasted beans, single origin or blends, grind preference (whole, drip, espresso). Roaster partnerships from 15 countries.
      Flexibility: Pause, skip, or cancel anytime. No commitment. Gift subscriptions: 3/6/12 months prepaid option. First box ships within 3 business days.
