# behavioural Signals - Keyword Detection Patterns
# Used by analysis.py for intent classification and state detection

# Impatience signals (user wants to skip discovery and see options)
# Deduplicated: removed overlaps with demand_directness and direct_info_requests
impatience:
  - "just show me"
  - "what are my options"
  - "hurry"
  - "skip to"
  - "bottom line"
  - "quick answer"
  - "don't have time"
  - "make it quick"

# Commitment signals (user is ready to buy/commit; checked at pitch/objection stages)
commitment:
  - "let's do it"
  - "i'm in"
  - "this one"
  - "that one"
  - "i'll take"
  - "both"
  - "let's go"
  - "sign me up"
  - "where do i sign"
  - "sold"
  - "deal"
  - "count me in"
  - "go ahead"
  - "proceed"
  - "book it"
  - "reserve"

# Objection signals (user has concerns or hesitation)
objection:
  - "think about"
  - "however"
  - "too much"
  - "hesitant"
  - "concerns"
  - "worried about"
  - "not convinced"
  - "still unsure"

# Walking signals (user is leaving or rejecting the offer)
walking:
  - "no thanks"
  - "not interested"
  - "pass"
  - "no"
  - "nah"
  - "not for me"
  - "i'll pass"
  - "not today"
  - "changed my mind"
  - "not what i want"

# Low intent signals (user is not actively buying, just browsing)
low_intent:
  - "all good"
  - "no issues"
  - "just browsing"
  - "just looking"
  - "fine as is"
  - "happy as is"
  - "no problem"
  - "no need"
  - "everything's fine"
  - "not right now"
  - "maybe later"
  - "just exploring"
  - "checking things out"
  - "seeing what's out there"
  - "window shopping"
  - "not urgent"
  - "no rush"
  - "not looking to buy"
  - "no plans"
  - "not in the market"
  - "nothing much"

# Guardedness keywords (simplified keyword-based detection)
# Patterns indicating user is being evasive, dismissive, or defensive
guardedness_keywords:
  # Sarcasm markers
  sarcasm:
    - "yeah sure"
    - "oh sure"
    - "right..."
    - "whatever you say"
    - "if you say so"
    - "sure thing"
    - "yeah right"
    - "oh really"
  
  # Deflection phrases
  deflection:
    - "i don't know"
    - "i'm not sure"
    - "i guess"
    - "maybe"
    - "i'll think about it"
    - "we'll see"
    - "let me consider"
  
  # Defensive statements
  defensive:
    - "it's fine"
    - "don't worry"
    - "i'm fine"
    - "i don't need"
    - "i'm good"
  
  # Single-word dismissals
  dismissal:
    - "whatever"
    - "idk"
    - "dunno"
  
  # Evasive question responses
  evasive:
    - "why do you ask"
    - "what do you mean"
    - "why does it matter"
    - "why do you care"
    - "what's it to you"
  
  # Agreement words (NOT guarded when following substantive answer)
  agreement_words:
    - "ok"
    - "sure"
    - "fine"
    - "alright"

# Intent classification priority order (controls which categories are checked first in classify_intent_level)
# Categories in HIGH_INTENT_CATS → return "high"; LOW_INTENT_CATS → return "low"
signal_priority:
  - high_intent
  - commitment
  - demand_directness
  - impatience
  - urgency
  - price_sensitivity
  - low_intent

# High intent signals (user actively wants to buy or solve a problem)
# NOTE: "want" and "need" removed — they are stopwords that fire on casual statements
# ("I want to make money", "I need milk") with no buying intent. Context keywords only
high_intent:
  - "looking for"
  - "trying to"
  - "help with"
  - "problem"
  - "struggling"
  - "urgent"
  - "asap"
  - "right away"
  - "as soon as possible"
  - "immediately"
  - "quickly"
  - "have to"
  - "must"
  - "ready to buy"
  - "ready to purchase"
  - "looking to buy"
  - "shopping for"

# Demand directness keywords (Conversational Repair Theory)
# User explicitly demanding the bot change approach
# NOTE: Only strong frustration signals belong here. Generic requests like
# "tell me" or "explain" are legitimate questions, not frustration
demand_directness:
  - "just tell me"
  - "get to the point"
  - "cut to the chase"
  - "what is it"
  - "i asked you"
  - "stop asking"
  - "im looking to"
  - "losing patience"
  - "i said"
  - "already told you"
  - "answer the question"
  - "directly"
  - "straight answer"
  - "stop beating around the bush"
  - "frustrated"
  - "that wasnt what i asked"
  - "wasnt what i"

# Emotional disclosure / vulnerability signals
