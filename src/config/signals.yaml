  - "angry"
  - "disappointed"
  - "failed"
  - "failure"
  - "let down"
  - "stuck"
  - "desperate"
  - "feels wrong"
  - "been rough"
  - "been hard"
  - "through a lot"
  - "gone through"

# Validation phrases for loop detection
validation_phrases:
