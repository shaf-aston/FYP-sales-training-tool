# Strategy detection keywords (used during intent/discovery phase)
# INTENT: Detect strategy from BOT's own messages (chatbot.py: _CONSULTATIVE_INDICATORS / _TRANSACTIONAL_INDICATORS)
# When bot says these words, it signals what strategy is active
#
# NOTE: These lists overlap with user_transactionalSIGNALS/user_consultativeSIGNALS intentionally:
# - transactional_bot_indicators: Words the bot outputs when using transactional strategy
# - user_transactionalSIGNALS: Words the USER says when they want transactional strategy
# Both lists are checked at different times/contexts, so duplication is correct by design

# Bot response indicators
transactional_bot_indicators:
  - "budget"
  - "price"
  - "cost"
  - "money"
  - "afford"
  - "spec"
  - "feature"
  - "delivery"
  - "availability"

consultative_bot_indicators:
  - "help you with"
  - "understand"
  - "transformation"
  - "goals"
  - "challenges"
  - "situation"
  - "approach"
  - "strategy"

# User intent signals (override bot detection)
# INTENT: Detect strategy from USER's messages (chatbot.py: _apply_advancement strategy switch)
# When user says these words, it signals their preference for which strategy to use
user_consultativeSIGNALS:
  - "mentor"
  - "mentorship"
  - "coaching"
  - "coach"
  - "consulting"
  - "guidance"
  - "training"
  - "program"
  - "service"
  - "improve"
  - "learn"

# NOTE: Keywords "budget", "price", "cost", "spec", "feature", "delivery", "availability" appear here
# AND in transactional_bot_indicators (above). This is intentional:
# - transactional_bot_indicators: Triggered when BOT outputs these words (confirms transactional mode)
# - user_transactionalSIGNALS: Triggered when USER inputs these words (user wants transactional)
# Both contexts are valid, and detection order is: user_transactionalSIGNALS checked first (user overrides bot)
user_transactionalSIGNALS:
  - "budget"
  - "price"
  - "cost"
  - "buy"
  - "purchase"
  - "order"
  - "spec"
  - "feature"
  - "availability"
  - "delivery"
  - "quote"
  - "how much"
  - "in stock"
  - "ship"
  - "checkout"
  - "add to cart"
