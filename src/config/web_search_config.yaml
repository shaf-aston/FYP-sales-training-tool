enabled: true
min_seconds_between_searches: 30
cache_ttl_seconds: 1800
max_results: 3

# Objection types that trigger a search at the OBJECTION stage
trigger_objection_types:
  - money
  - fear
  - think

# Phrases anywhere in the user message that trigger a search
trigger_phrases:
  - "proof"
  - "statistics"
  - "data"
  - "evidence"
  - "show me"
  - "any studies"
  - "can you prove"
  - "real numbers"

# Query templates — {keyword} is replaced with the product type
query_templates:
  money: "ROI statistics {keyword} cost savings"
  fear: "success rate {keyword} risk case study"
  think: "{keyword} vs alternatives comparison"
  explicit: "{keyword} facts data"
