# Objection Pathway Framework: Maps barrier types to structured pathways
# Framework: Sales Sniper objection handling + user's collaborative interpretation
# Categories: Resource (funding), Stakeholder (approval), Internal (fear), Unclear (disengagement)

version: "1.0"

# ============================================================================
# CATEGORY MAPPINGS: Top-level barrier classification
# ============================================================================

category_mapping:
  
  # RESOURCE BARRIER: Funding/Budget limitations (Logistical)
  resource:
    display_name: "Resource (Funding)"
    keywords:
      - "money"
      - "funds"
      - "budget"
      - "can't afford"
      - "no money"
      - "expensive"
      - "costs"
      - "price"
      - "financial"
    entry_question: "Without budget limits, is this the right choice for you?"
    reframes:
      - "change_of_process"
      - "island_mountain"
      - "identity_loop"
    funding_options:
      - "savings"
      - "credit/paypal"
      - "staged_payment"
      - "partnerships"
      - "business_profit_recovery"
    open_wallet_applicable: true
    subtypes:
      - id: "funding"
        display_name: "No Funding Available"
        indicators:
          - "i don't have"
          - "can't afford"
          - "no funds"
          - "out of budget"
      - id: "staged_payment"
        display_name: "Prefers Payment Plan"
        indicators:
          - "payment plan"
          - "installments"
          - "over time"
          - "monthly"
    dialogue_guidance: |
      PROSPECT-FIRST APPROACH: Let them identify solutions themselves before offering options.
      Step 1: Test value alignment - "If funding wasn't a barrier, would this solve your challenge?"
      Step 2: Elicit self-discovery - "How might you creatively find the funds? What avenues come to mind?"
      Step 3: Plant credit idea (if stuck) - "Some clients use credit cards or PayPal and pay it off with the returns they see. Have you considered that?"
      Step 4: Offer explicit options - Only if they've exhausted their own ideas.

  # STAKEHOLDER BARRIER: Third-party approval (Logistical)
  stakeholder:
    display_name: "Stakeholder (Approval)"
    keywords:
      - "need to check with"
      - "partner"
      - "husband"
      - "wife"
      - "boss"
      - "manager"
      - "dad"
      - "mom"
      - "investor"
      - "approval"
      - "somebody else"
    entry_question: "For YOU independently, is this the right choice?"
    reframes:
      - "change_of_process"
      - "island_mountain"
      - "identity_loop"
    funding_options: []
    open_wallet_applicable: true
    subtypes:
      - id: "approval"
        display_name: "Requires Third-Party Approval"
        indicators:
          - "need to check"
          - "get approval"
          - "ask permission"
          - "have to discuss"
      - id: "consensus"
        display_name: "Wants Joint Decision"
        indicators:
          - "what does your partner think"
          - "we need to decide together"
          - "my spouse would want to know"
    dialogue_guidance: |
      SAME-SIDE ALIGNMENT: Establish personal conviction before managing approval concerns.
      Step 1: Align personally - "Setting them aside for a moment, does this feel right for YOU?"
      Step 2: Explore impact - "What would this change for you or your household? How critical is that?"
      Step 3: Assess approval necessity - "Is their approval essential, or is it more of a courtesy discussion?"
      Step 4a: If approval needed → Open Wallet Test (commitment signal)
      Step 4b: If not essential → Soft close and handle remaining objections as fear-based

  # INTERNAL BARRIER: Psychological resistance, mindset gaps (Internal)
  internal:
    display_name: "Internal (Psychological/Mindset)"
    keywords:
      - "need to think about it"
      - "need to think"
      - "let me think"
      - "not sure"
      - "unsure"
      - "hesitant"
      - "worried"
      - "scared"
      - "nervous"
      - "anxious"
      - "not my thing"
      - "not who i am"
      - "feels wrong"
    entry_question: "Does your current decision-making process get you to your goal?"
    reframes:
      - "change_of_process"
      - "island_mountain"
      - "identity_loop"
    funding_options: []
    open_wallet_applicable: false
    subtypes:
      - id: "psychological_fear"
        display_name: "Psychological/Emotional Fear"
        indicators:
          - "scared"
          - "nervous"
          - "anxious"
          - "worried"
          - "don't feel ready"
      - id: "identity_resistance"
        display_name: "Identity/Self-Image Barrier"
        indicators:
          - "not my thing"
          - "not who i am"
          - "feels wrong"
          - "doesn't suit me"
      - id: "decision_paralysis"
        display_name: "Analysis Paralysis"
        indicators:
          - "need to think"
          - "let me think"
          - "not ready"
          - "need more time"
    dialogue_guidance: |
      PERSPECTIVE SHIFT VIA REFRAMES: Guide through R1 → R2 → R3 sequence.
      Core principle: Your current mindset shapes your decisions. To get different results, decide like someone who's already succeeded.
      After each reframe, pause and ask: "Does that shift anything for you?" Only proceed to next if they're still stuck.

  # UNCLEAR BARRIER: Smokescreens, disengagement, moving targets (Unclear)
  unclear:
    display_name: "Unclear (Smokescreen/Disengagement)"
    keywords:
      - "not sure exactly"
      - "just general concerns"
      - "maybe later"
      - "not right now"
      - "too much going on"
    entry_question: "What specifically is holding you back right now?"
    reframes: []
    funding_options: []
    open_wallet_applicable: false
    subtypes:
      - id: "vague"
        display_name: "Vague/Unspecified"
        indicators:
          - "not sure"
          - "just generally"
      - id: "moving_target"
        display_name: "Moving Target/Multiple Objections"
        indicators:
          - "also this"
          - "and that too"
    dialogue_guidance: |
      PATTERN SPOTTED: Multiple concerns or shifting objections suggest disengagement or unclear fit.
      STEP 1 - CLARIFY: "What specifically is blocking you?" Dig for a real objection.
      STEP 2 - AUTONOMY OFFER (if still vague): "What would need to change for this to make sense for you?"
      STEP 3 - FIT ASSESSMENT: If they remain disengaged despite clarity, there may be no genuine fit. Respect that decision and exit gracefully.

# ============================================================================
# REFRAME DESCRIPTIONS: Detailed dialogue & examples for each reframe
# ============================================================================

reframe_descriptions:
  change_of_process:
    title: "Reframe #1: Change of Process"
    short_name: "R1 — Process"
    dialogue: |
      The way you make decisions directly affects the results you get. Are you 100% satisfied with where you are right now?
      [Pause for answer]
      Do you want that current decision-making process to determine your future results? 
    example: "The frustration you're feeling? It's not really about [the solution]. It's that you've been making decisions the old way, and you keep getting the same results. What if the issue isn't the opportunity—it's the decision-making process itself?"
    check_question: "Does that make sense?"

  island_mountain:
    title: "Reframe #2: Island ↔ Mountain"
    short_name: "R2 — Perspective"
    dialogue: |
      Imagine you're on an island. You can only see a few miles in every direction. Every decision you make is based on that limited view.
      But from a mountain top, you can see the whole landscape. The perspective changes everything.
      Right now you're on the island. This choice? It's the climb up the mountain.
    example: "Here's the thing: from where you're standing right now, this feels risky. But that's because you're viewing it from the ground. The people who already made this move? They're on the mountain now, and it doesn't feel risky anymore—it feels obvious."
    check_question: "Can you see yourself on that mountain looking back?"

  identity_loop:
    title: "Reframe #3: Identity-Behavior Loop"
    short_name: "R3 — Identity"
    dialogue: |
      The fit and healthy person doesn't become fit by thinking about fitness. They become fit by making the decisions a fit person makes.
      You're not just choosing [the solution]. You're choosing to become the person who makes these decisions.
      That identity shift? That's everything.
    example: "This isn't about one choice. It's about who you're becoming. The decisions you make today shape who you are tomorrow. So the real question is: who do you want to become?"
    check_question: "Does that resonate with where you want to go?"
# ============================================================================
# FUNDING OPTIONS: Explicit options for Resource pathway
# ============================================================================

funding_options_detail:
  savings:
    label: "Savings"
    description: "Draw from existing cash reserves"
    prompt: "How much of this could you cover from savings?"

  credit_paypal:
    label: "Credit / PayPal / Digital Wallet"
    description: "Use existing credit line or payment platform"
    prompt: "Would using a credit card or PayPal work for you? Many clients use this and pay it off with the returns they see."

  staged_payment:
    label: "Staged Payment Plan"
    description: "Split investment over weeks/months"
    prompt: "Would breaking it into multiple payments make this work?"

  partnerships:
    label: "Partnerships / Collaboration"
    description: "Split cost with partner or team member"
    prompt: "Could you partner with someone to share the investment?"

  business_profit_recovery:
    label: "Business Profit Recovery"
    description: "Invest from business income/profits"
    prompt: "Could this investment come from business profits or income?"

# ============================================================================
# PATHWAY RULES: Logic for advancing through reframes & pathways
# ============================================================================

pathway_rules:
  # Reframe advancement: move to next reframe only if gap acknowledged
  reframe_advancement:
    requires_acknowledgment: true
    max_attempts_per_reframe: 3
    escalation_on_max_attempts: "move_to_clarify"  # ask what specifically holds them back

  # Resource pathway: confirm value before guiding exploration
  resource_pathway:
    entry_step: "agreement_on_value"  # Ask: "Without budget, is this right for you?"
    exploration_mode: "prospect_first"  # Ask: "How would YOU find funding?" before offering options
    decision_gate: "feasibility_and_commitment"  # Can they actually execute? Committed?

  # Stakeholder pathway: personal alignment before consensus
  stakeholder_pathway:
    entry_step: "personal_alignment"  # Confirm: "For YOU independent, is this right?"
    same_side_step: "establish_conviction"  # "Does this feel right for you? What's the impact?"
    approval_assessment: "is_approval_essential"  # "Is their approval required, or a courtesy?"
    commitment_step: "open_wallet_test"  # If approval critical: card info offer (commitment signal)
    fallback_step: "schedule_joint_discussion"  # If both parties needed: arrange meeting

  # Internal pathway: explicit reframe sequence
  internal_pathway:
    entry_step: "gap_acknowledgment"  # Ask: "Does your decision-making get you to your goal?"
    reframe_sequence: ["change_of_process", "island_mountain", "identity_loop"]
    check_after_each: true  # Add check question after each reframe
    escalation_on_no_shift: "clarify_barriers"  # If no perspective shift after R3, dig deeper

  # Unclear pathway: clarification then pattern analysis
  unclear_pathway:
    entry_step: "specific_objection_discovery"  # Ask: "What specifically?"
    if_emerges: "reclassify"  # If specific objection emerges → go to that pathway
    if_pattern_detected: "analyze_fit"  # If multiple objections + disengagement → assess true fit
    exit_option: "respectful_exit"  # If no genuine fit detected: exit with door open

# ============================================================================
# OUTCOME PATHWAYS: Different handling for Agreement / Follow-up / Exit
# ============================================================================

outcomes:
  agreement:
    label: "Agreement Path"
    indicator: "User commits to next step"
    handling: "Confirm commitment, define next steps, establish relationship"
    message_tone: "Energized, forward-looking"
    analytics_tag: "commitment_secured"

  follow_up:
    label: "Follow-up Path"
    indicator: "User wants more time / stakeholder input needed"
    handling: "Schedule checkpoint, keep door open, gentle follow-up"
    message_tone: "Patient, supportive"
    analytics_tag: "pending_reengage"

  exit:
    label: "Respectful Exit"
    indicator: "No genuine fit detected / too many barriers"
    handling: "Acknowledge, respect decision, emphasize door remains open"
    message_tone: "Respectful, warm, non-pressuring"
    analytics_tag: "respectfully_exited"

# ============================================================================
# TYPE MAPPING: Old classification (6-type) → New categories
# ============================================================================

type_to_category_mapping:
  "money": "resource"
  "partner": "stakeholder"
  "fear": "internal"
  "logistical": "resource"  # Could be funding or approval
  "think": "internal"
  "smokescreen": "unclear"
  "unknown": "unclear"
